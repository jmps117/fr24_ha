name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create integration zip
        run: |
          cd custom_components/fr24_tracker
          zip -r ../../fr24_tracker.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: fr24_tracker.zip
